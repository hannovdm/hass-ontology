name: Memgraph
version: "3.12.0"
slug: memgraph
description: >-
  Memgraph graph database — the backing store for the Home Assistant Ontology
  integration. Exposes the Bolt protocol on port 7687 and persists graph data
  under the add-on's /data volume so it survives restarts and updates.
url: "https://github.com/hannovdm/hass-ontology/tree/main/memgraph_addon"
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
ports:
  7687/tcp: 7687
ports_description:
  7687/tcp: >-
    Bolt protocol port used by the Ontology integration and any other
    Bolt-compatible client (e.g. Memgraph Lab, mgconsole).
watchdog: "tcp://[HOST]:7687"
# Grants access to the Supervisor REST API (via the SUPERVISOR_TOKEN env var)
# so run.sh can look up its own hostname and announce itself to Home
# Assistant via the Discovery API, letting the Ontology integration
# auto-configure its Memgraph connection instead of requiring manual entry.
hassio_api: true
discovery:
  - ontology
options: {}
schema: {}
